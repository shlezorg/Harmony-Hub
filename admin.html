<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Product Management</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const AdminPanel = () => {
            const [products, setProducts] = useState([]);
            const [formData, setFormData] = useState({ id: '', name: '', price: '', image: '' });
            const [isEditing, setIsEditing] = useState(false);

            useEffect(() => {
                fetchProducts();
            }, []);

            const fetchProducts = async () => {
                try {
                    const response = await fetch('http://localhost/sliit pro/index.php');
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    const data = await response.json();
                    setProducts(data);
                } catch (error) {
                    console.error('Error fetching products:', error);
                    alert('Failed to fetch products: ' + error.message);
                }
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData({ ...formData, [name]: value });
            };

            const handleAddOrUpdate = async (e) => {
                e.preventDefault();
                if (!formData.name || !formData.price || !formData.image) {
                    alert('Please fill all fields');
                    return;
                }

                const productData = {
                    ...formData,
                    price: parseFloat(formData.price)
                };

                try {
                    const response = await fetch(isEditing ? 
                        'http://localhost/sliit pro/update_product.php?id=' + formData.id :
                        'http://localhost/sliit pro/index.php', {
                        method: isEditing ? 'PUT' : 'POST',
                        headers: { 'Content-Type': isEditing ? 'application/x-www-form-urlencoded' : 'application/json' },
                        body: isEditing ? 
                            new URLSearchParams(productData).toString() :
                            JSON.stringify(productData)
                    });
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    const result = await response.json();
                    if (result.message.includes('Error')) {
                        throw new Error(result.message);
                    }
                    fetchProducts();
                    setFormData({ id: '', name: '', price: '', image: '' });
                    setIsEditing(false);
                    alert(result.message);
                } catch (error) {
                    console.error('Error saving product:', error);
                    alert('Failed to save product: ' + error.message);
                }
            };

            const handleEdit = (product) => {
                setFormData(product);
                setIsEditing(true);
            };

            const handleDelete = async (id) => {
                if (window.confirm('Are you sure you want to delete this product?')) {
                    try {
                        const response = await fetch(`http://localhost/sliit pro/index.php?id=${id}`, {
                            method: 'DELETE'
                        });
                        if (!response.ok) {
                            throw new Error(`HTTP error! Status: ${response.status}`);
                        }
                        const result = await response.json();
                        if (result.message.includes('Error')) {
                            throw new Error(result.message);
                        }
                        fetchProducts();
                        alert(result.message);
                    } catch (error) {
                        console.error('Error deleting product:', error);
                        alert('Failed to delete product: ' + error.message);
                    }
                }
            };

            return (
                <div className="container mx-auto p-6">
                    <div className="flex justify-between items-center mb-6">
    <h1 className="text-3xl font-bold">
        Admin Product Management
    </h1>

    <button
        onClick={() => {
            if (window.confirm("Are you sure you want to logout?")) {
                window.location.href = "login.html";
            }
        }}
        className="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600"
    >
        <i className="fas fa-sign-out-alt mr-2"></i>
        Logout
    </button>
</div>
                    <div className="bg-white p-6 rounded-lg shadow-md mb-8">
                        <h2 className="text-xl font-semibold mb-4">{isEditing ? 'Update Product' : 'Add Product'}</h2>
                        <div className="space-y-4">
                            <input
                                type="text"
                                name="name"
                                value={formData.name}
                                onChange={handleInputChange}
                                placeholder="Product Name"
                                className="w-full p-2 border rounded"
                            />
                            <input
                                type="number"
                                name="price"
                                value={formData.price}
                                onChange={handleInputChange}
                                placeholder="Price"
                                step="0.01"
                                className="w-full p-2 border rounded"
                            />
                            <input
                                type="text"
                                name="image"
                                value={formData.image}
                                onChange={handleInputChange}
                                placeholder="Image Path (e.g., products/guitar1.png)"
                                className="w-full p-2 border rounded"
                            />
                            <button
                                onClick={handleAddOrUpdate}
                                className="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600"
                            >
                                {isEditing ? 'Update Product' : 'Add Product'}
                            </button>
                            {isEditing && (
                                <button
                                    onClick={() => {
                                        setFormData({ id: '', name: '', price: '', image: '' });
                                        setIsEditing(false);
                                    }}
                                    className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 ml-2"
                                >
                                    Cancel
                                </button>
                            )}
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-lg shadow-md">
                        <h2 className="text-xl font-semibold mb-4">Product List</h2>
                        <table className="w-full border-collapse">
                            <thead>
                                <tr className="bg-gray-100">
                                    <th className="border p-2">ID</th>
                                    <th className="border p-2">Name</th>
                                    <th className="border p-2">Price</th>
                                    <th className="border p-2">Image</th>
                                    <th className="border p-2">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {products.map(product => (
                                    <tr key={product.id} className="hover:bg-gray-50">
                                        <td className="border p-2">{product.id}</td>
                                        <td className="border p-2">{product.name}</td>
                                        <td className="border p-2">${parseFloat(product.price).toFixed(2)}</td>
                                        <td className="border p-2">
                                            <img src={product.image} alt={product.name} className="w-16 h-16 object-cover" />
                                        </td>
                                        <td className="border p-2">
                                            <button
                                                onClick={() => handleEdit(product)}
                                                className="text-blue-500 hover:text-blue-700 mr-2"
                                            >
                                                <i className="fas fa-edit"></i>
                                            </button>
                                            <button
                                                onClick={() => handleDelete(product.id)}
                                                className="text-red-500 hover:text-red-700"
                                            >
                                                <i className="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<AdminPanel />);
    </script>
</body>
</html>
